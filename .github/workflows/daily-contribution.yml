name: Weekly Capped Contributions (Random ≤5)

on:
  schedule:
    - cron: '0 0 * * *'  # runs daily
  workflow_dispatch:

permissions:
  contents: write

jobs:
  make-contribution:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Count commits this week
        id: weekly_count
        run: |
          COUNT=$(git log --since="last monday" --pretty=oneline | wc -l)
          echo "count=$COUNT" >> $GITHUB_OUTPUT

      - name: Decide to run (random + cap 5/week)
        id: should_run
        run: |
          COUNT=${{ steps.weekly_count.outputs.count }}
          RAND=$((RANDOM % 7))  # randomness layer
          
          if [ "$COUNT" -ge 5 ]; then
            echo "Weekly limit reached"
            echo "run=false" >> $GITHUB_OUTPUT
          elif [ $RAND -lt 2 ]; then
            echo "Random skip"
            echo "run=false" >> $GITHUB_OUTPUT
          else
            echo "run=true" >> $GITHUB_OUTPUT
          fi

      - name: Random delay (0–8 hours)
        if: steps.should_run.outputs.run == 'true'
        run: |
          DELAY=$((RANDOM % 28800))
          sleep $DELAY

      - name: Make contribution
        if: steps.should_run.outputs.run == 'true'
        run: echo "$(date)" >> README.md

      - name: Commit and push
        if: steps.should_run.outputs.run == 'true'
        run: |
          git config user.name "oaldak01"
          git config user.email "sup2021@icloud.com"
          git add README.md
          git commit -m "Daily contribution"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
